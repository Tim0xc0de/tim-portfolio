baseURL = "https://www.tim-mehmeti.dev/"
title = "Tim Mehmeti"
theme = "PaperMod"


defaultContentLanguage = "de"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 5

[params.assets]
    disableFingerprinting = true
    disableHLJS = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    contentDir = "content/en"
    title = "Tim Mehmeti — Backend Developer"

    [languages.en.params.profileMode]
      enabled = true
      title = "Tim Mehmeti | IT Specialist & Backend Developer"
      subtitle = "Backend developer focused on C# and .NET. I handle the modernization of existing applications and build clean interfaces for digital workflows. Always interested in new challenges and technical exchange."
      imageUrl = "images/timmehmemeti_pb.jpg"
      imageWidth = 160
      imageHeight = 160
      imageTitle = "Tim Mehmeti"

    [[languages.en.params.profileMode.buttons]]
      name = "Work & Experience"
      url = "projects/"

    [[languages.en.params.profileMode.buttons]]
      name = "About Me"
      url = "about/"

    [[languages.en.menu.main]]
      name = "Home"
      url = ""
      weight = 5

    [[languages.en.menu.main]]
      name = "About"
      url = "about/"
      weight = 10

    [[languages.en.menu.main]]
      name = "Work & Experience"
      url = "projects/"
      weight = 20

    [[languages.en.menu.main]]
      name = "At a Glance"
      url = "timeline/"
      weight = 15

  [languages.de]
    languageName = "Deutsch"
    weight = 2
    contentDir = "content/de"
    title = "Tim Mehmeti — Backend Entwickler"

    [languages.de.params.profileMode]
      enabled = true
      title = "Tim Mehmeti | IT-Specialist & Backend Developer"
      subtitle = "Backend-Entwickler mit Fokus auf C# und .NET. Ich kümmere mich um die Modernisierung bestehender Anwendungen und baue saubere Schnittstellen für digitale Abläufe. Immer interessiert an neuen Herausforderungen und technischem Austausch."
      imageUrl = "images/timmehmemeti_pb.jpg"
      imageWidth = 160
      imageHeight = 160
      imageTitle = "Tim Mehmeti"

    [[languages.de.params.profileMode.buttons]]
      name = "Arbeit & Erfahrung"
      url = "projects/"

    [[languages.de.params.profileMode.buttons]]
      name = "Über mich"
      url = "about/"

    [[languages.de.menu.main]]
      name = "Start"
      url = ""
      weight = 5

    [[languages.de.menu.main]]
      name = "Über mich"
      url = "about/"
      weight = 10

    [[languages.de.menu.main]]
      name = "Arbeit & Erfahrung"
      url = "projects/"
      weight = 20

    [[languages.de.menu.main]]
      name = "Kurz und Knapp"
      url = "timeline/"
      weight = 15

[params]
  env = "production"
  description = "Tim Mehmeti - Backend Developer specializing in .NET modernization, APIs, and clean architecture"
  author = "Tim Mehmeti"
  
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowLanguageSwitcher = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.label]
    text = "Tim Mehmeti"
    icon = "images/timmehmemeti_pb.jpg"
    iconHeight = 35

[markup]
  [markup.highlight]
    noClasses = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "dracula"

  [markup.goldmark.renderer]
    unsafe = true